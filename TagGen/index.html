<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Badge Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1 class="header__title">GitHub Badge Generator</h1>
      <p class="header__subtitle">Generate custom GitHub README badges instantly.</p>
    </header>

    <!-- Badge Configuration Panel -->
    <section class="config-panel">
      <h2 class="section-title">Badge Configuration</h2>

      <div class="form-grid">
        <div class="form-group">
          <label for="label-input">Label</label>
          <input type="text" id="label-input" placeholder="e.g. Windows, Linux, Build, Tests" value="Windows" />
        </div>

        <div class="form-group">
          <label for="status-input">Status Text</label>
          <input type="text" id="status-input" placeholder="e.g. passing, failing, building" value="passing" />
        </div>

        <div class="form-group">
          <label for="label-color">Label Color</label>
          <div class="color-row">
            <input type="color" id="label-color" value="#555555" />
            <input type="text" id="label-color-hex" value="#555555" class="color-hex" />
          </div>
        </div>

        <div class="form-group">
          <label for="status-color">Status Color</label>
          <div class="color-row">
            <input type="color" id="status-color" value="#44cc11" />
            <input type="text" id="status-color-hex" value="#4c1" class="color-hex" />
          </div>
        </div>

        <div class="form-group form-group--full">
          <label for="icon-select">Icon (optional)</label>
          <select id="icon-select">
            <option value="none">None</option>
            <option value="windows">Windows</option>
            <option value="linux">Linux</option>
            <option value="macos">macOS</option>
            <option value="github">GitHub</option>
            <option value="docker">Docker</option>
            <option value="node">Node</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Preview Section -->
    <section class="preview-section">
      <h2 class="section-title">Live Preview</h2>
      <div class="preview-container" id="preview-container">
        <!-- SVG badge injected by JS -->
      </div>
    </section>

    <!-- Generated Output -->
    <section class="output-section">
      <h2 class="section-title">Generated Output</h2>

      <div class="output-actions">
        <button type="button" class="btn btn--primary" id="copy-svg-btn" title="Copy SVG code">Copy SVG</button>
        <button type="button" class="btn btn--primary" id="copy-md-btn" title="Copy Markdown">Copy Markdown</button>
        <button type="button" class="btn btn--secondary" id="download-svg-btn" title="Download SVG file">Download SVG</button>
        <button type="button" class="btn btn--ghost" id="theme-toggle" title="Toggle dark/light theme">Theme</button>
      </div>

      <div class="output-block">
        <div class="output-block__header">
          <span>Raw SVG</span>
          <button type="button" class="btn btn--small" id="copy-svg-inline">Copy</button>
        </div>
        <pre class="output-code" id="svg-output"><code></code></pre>
      </div>

      <div class="output-block">
        <div class="output-block__header">
          <span>Markdown (image)</span>
          <button type="button" class="btn btn--small" id="copy-md-inline">Copy</button>
        </div>
        <pre class="output-code" id="md-output"><code></code></pre>
      </div>

      <div class="output-block">
        <div class="output-block__header">
          <span>Markdown (img tag)</span>
          <button type="button" class="btn btn--small" id="copy-md-img-inline">Copy</button>
        </div>
        <pre class="output-code" id="md-img-output"><code></code></pre>
      </div>

      <div class="output-block output-block--url">
        <div class="output-block__header">
          <span>Share URL</span>
          <button type="button" class="btn btn--small" id="copy-url-btn">Copy</button>
        </div>
        <pre class="output-code output-code--url" id="url-output"><code></code></pre>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
